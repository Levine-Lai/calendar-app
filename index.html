<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>体育迷日历</title>
    <style>html,body{margin:0;min-height:100%;background:#fbf4ea;color:#16120f}</style>
    <link rel="stylesheet" href="public/styles.css?v=2.2.6">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="赛程设置" aria-hidden="true">
        <section class="masthead" aria-label="应用标题">
        <div class="brand">
          <h1>体育迷日历</h1>
        </div>
          <button class="icon-button sidebar-close" id="sidebarClose" title="关闭菜单" aria-label="关闭菜单">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </section>

        <section class="panel manage-panel">
          <div class="section-title">
            <span>赛程管理</span>
          </div>
          <div class="drawer-actions">
            <button class="secondary-button" id="updateImportedBtn">更新</button>
            <button class="danger-button" id="deleteImportedBtn">删除</button>
          </div>
          <div class="status-line" id="statusLine" role="status"></div>
        </section>

        <section class="panel team-news-panel" aria-labelledby="teamNewsPanelTitle">
          <div class="team-news-heading">
            <img src="public/assets/teams/toronto-blue-jays.png" alt="" width="48" height="48">
            <div>
              <p class="eyebrow">MLB 主队</p>
              <h2 id="teamNewsPanelTitle">多伦多蓝鸟新闻</h2>
            </div>
          </div>
          <p class="team-news-preview" id="teamNewsPreview">部署新闻服务后，将在这里显示 MLB 官方英文新闻。</p>
          <div class="team-news-actions">
            <button class="primary-button" id="openTeamNewsBtn" type="button">查看新闻</button>
            <button class="secondary-button" id="testTeamNewsPushBtn" type="button">测试通知</button>
            <label class="toggle-row team-news-toggle">
              <input id="teamNewsPushToggle" type="checkbox">
              <span>准实时推送</span>
            </label>
          </div>
          <p class="team-news-status" id="teamNewsPanelStatus" role="status" aria-live="polite"></p>
        </section>

        <section class="panel import-panel">
          <div class="section-title">
            <span>联赛导入</span>
            <button class="icon-button" id="refreshBtn" title="刷新赛程" aria-label="刷新赛程">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.4M3 12A9 9 0 0 1 18.3 5.6"/><path d="M21 4v6h-6M3 20v-6h6"/></svg>
            </button>
          </div>
          <div class="league-grid" id="leagueGrid"></div>
          <div class="team-picker">
            <label class="field">
              <span>选择球队</span>
              <input id="teamSearchInput" type="text" placeholder="搜索球队，例如 Lakers / Arsenal">
            </label>
            <div class="team-status" id="teamStatus">请选择联赛</div>
            <div class="team-grid" id="teamGrid"></div>
          </div>
          <button class="primary-button" id="importLeagueBtn">导入该球队全部赛程</button>
        </section>

        <section class="stats-row" aria-label="统计">
          <div>
            <span id="totalCount">0</span>
            <small>全部比赛</small>
          </div>
          <div>
            <span id="watchCount">0</span>
            <small>命中偏好</small>
          </div>
          <div>
            <span id="nextGameLabel">暂无</span>
            <small>下一场</small>
          </div>
        </section>

        <section class="panel">
          <div class="section-title">
            <span>我的偏好</span>
          </div>
          <label class="field">
            <span>关注球队 / 关键词</span>
            <input id="teamFilterInput" type="text" placeholder="Lakers, Arsenal, Dodgers">
          </label>
          <label class="toggle-row">
            <input id="favoritesOnly" type="checkbox">
            <span>只看命中的比赛</span>
          </label>
          <label class="toggle-row">
            <input id="hideFinished" type="checkbox">
            <span>隐藏已结束比赛</span>
          </label>
        </section>

        <section class="panel">
          <div class="section-title">
            <span>文件导入</span>
          </div>
          <input id="fileImport" type="file" accept=".ics,.csv,.json,text/calendar,application/json,text/csv">
        </section>

        <section class="panel app-update-panel" aria-labelledby="appUpdateTitle">
          <div class="section-title">
            <span id="appUpdateTitle">应用更新</span>
            <strong class="app-version" id="currentAppVersion">v2.2.6</strong>
          </div>
          <p class="app-update-status" id="appUpdateStatus" role="status" aria-live="polite">点击按钮检查是否有新版本</p>
          <ul class="app-update-notes" id="appUpdateNotes" hidden></ul>
          <div class="app-update-actions">
            <button class="secondary-button app-update-button" id="checkAppUpdateBtn" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.4M3 12A9 9 0 0 1 18.3 5.6"/><path d="M21 4v6h-6M3 20v-6h6"/></svg>
              <span>检查更新</span>
            </button>
            <button class="primary-button app-update-button" id="downloadAppUpdateBtn" type="button" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/></svg>
              <span>打开下载页</span>
            </button>
          </div>
        </section>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay" hidden></div>

      <section class="workspace">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuToggle" title="打开菜单" aria-label="打开菜单" aria-controls="sidebar" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
          </button>
          <div>
            <p class="eyebrow" id="todayLabel"></p>
            <h2 id="rangeTitle">我的赛程</h2>
          </div>
          <div class="actions">
            <button class="icon-button" id="prevBtn" title="上一段" aria-label="上一段">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button class="icon-button" id="todayBtn" title="回到今天" aria-label="回到今天">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4M16 2v4M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>
            </button>
            <button class="icon-button" id="nextBtn" title="下一段" aria-label="下一段">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </div>
        </header>
        <section id="calendarView" class="calendar-view"></section>
      </section>
    </main>

    <div class="day-modal-overlay" id="dayModal" hidden>
      <section class="day-modal" role="dialog" aria-modal="true" aria-labelledby="dayModalTitle">
        <header class="day-modal-header">
          <div>
            <p class="eyebrow" id="dayModalCount"></p>
            <h3 id="dayModalTitle">当天赛程</h3>
          </div>
          <button class="icon-button day-modal-close" id="dayModalClose" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </header>
        <div class="day-modal-body" id="dayModalBody"></div>
      </section>
    </div>

    <div class="day-modal-overlay" id="deleteModal" hidden>
      <section class="day-modal manage-modal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <header class="day-modal-header">
          <div>
            <p class="eyebrow" id="deleteModalCount"></p>
            <h3 id="deleteModalTitle">删除球队赛程</h3>
          </div>
          <button class="icon-button day-modal-close" id="deleteModalClose" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </header>
        <div class="day-modal-body" id="deleteModalBody"></div>
      </section>
    </div>

    <div class="day-modal-overlay team-news-overlay" id="teamNewsModal" hidden>
      <section class="day-modal team-news-modal" role="dialog" aria-modal="true" aria-labelledby="teamNewsModalTitle">
        <header class="day-modal-header team-news-modal-header">
          <div class="team-news-heading">
            <img src="public/assets/teams/toronto-blue-jays.png" alt="" width="48" height="48">
            <div>
              <p class="eyebrow" id="teamNewsUpdatedAt">等待同步</p>
              <h3 id="teamNewsModalTitle">多伦多蓝鸟新闻</h3>
            </div>
          </div>
          <div class="team-news-header-actions">
            <button class="icon-button" id="refreshTeamNewsBtn" title="刷新新闻" aria-label="刷新新闻">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.4M3 12A9 9 0 0 1 18.3 5.6"/><path d="M21 4v6h-6M3 20v-6h6"/></svg>
            </button>
            <button class="icon-button day-modal-close" id="teamNewsModalClose" title="关闭" aria-label="关闭">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </header>
        <div class="team-news-modal-status" id="teamNewsModalStatus" role="status" aria-live="polite"></div>
        <div class="day-modal-body team-news-list" id="teamNewsList"></div>
      </section>
    </div>

    <script src="public/calendar-core.js?v=2.2.6"></script>
    <script src="public/calendar-storage.js?v=2.2.6"></script>
    <script src="public/calendar-image-cache.js?v=2.2.6"></script>
    <script src="public/update-config.js?v=2.2.6"></script>
    <script src="public/app-update.js?v=2.2.6"></script>
    <script src="public/team-news-config.js?v=2.2.6"></script>
    <script src="public/team-news-core.js?v=2.2.6"></script>
    <script src="public/app.js?v=2.2.6"></script>
  </body>
</html>
